# PERMITE O ACESSO AOS VALORES DEFINIDOS NO ARQUIVOS PROPERTIES LOCAIS
spring.config.import=logs.properties

spring.application.name=torneio-export-manager

# O Render injeta a porta na variavel de ambiente PORT
server.port=${PORT:8080}
# Otimizacao para Spring Boot 3+ em ambientes com pouca memoria
spring.main.lazy-initialization=true

# Habilita Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# Configuracao de Upload para arquivos grandes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
