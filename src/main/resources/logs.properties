# ====================================================================
# 1. CONFIGURACAO BASE E SAIDA DE LOG
# ====================================================================

# 1.1. Ativa logs para Arquivo (necessario para a rotacao)
# Define o caminho e nome do arquivo de log principal
# IMPORTANTE: A rotacao funciona melhor quando voce usa o nome do arquivo, e nao apenas o caminho.
logging.file.name=/var/log/${spring.application.name}/${spring.application.name}.log


# ====================================================================
# 2. CONFIGURACAO DE NIVEIS DE LOG (Robusto)
# ====================================================================

# Nivel Padrao (ROOT): INFO em producao para reduzir o ruido
logging.level.root=INFO

# Nivel para seu codigo: Ajuste para pacotes especificos da sua aplicacao
logging.level.br.com.srcsoftware.dashboard=INFO

# Reduz o ruido de frameworks para WARN
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.org.apache.tomcat=INFO

# ====================================================================
# 3. ROTACAO DE ARQUIVOS (As configuracoes mais robustas possiveis sem XML)
# ====================================================================

# ** Logback Rolling Policy (Substitui a rotacao padrao de 10MB) **

# 3.1. Padrao de Nomenclatura dos Arquivos Rolados
# Isso ativa a rotacao Diaria (%d{yyyy-MM-dd}) e por Indice (%i) para a rotacao por tamanho.
# Sem o XML, NAO e possivel adicionar o .gz para compressao automaticamente.
logging.logback.rollingpolicy.file-name-pattern=${logging.file.name}.%d{yyyy-MM-dd}.%i.log

# 3.2. Tamanho Maximo do Arquivo ATIVO
# Define o tamanho maximo antes que o Logback force uma rotacao (no mesmo dia).
# A rotacao por tamanho e crucial para evitar arquivos gigantes. (O padrao e 10MB)
logging.logback.rollingpolicy.max-file-size=50MB

# 3.3. Retencao de Historico
# Define quantos arquivos rolados serao mantidos (em dias ou unidades de rotacao).
# O padrao do Spring e 7. Aumente para 30 dias de retencao.
logging.logback.rollingpolicy.max-history=30

# 3.4. Limite de Tamanho Total (Capacidade Maxima)
# Limita o espaco total que todos os logs arquivados (os rolados) podem ocupar no disco.
# Essencial para evitar que os logs antigos causem falta de espaco.
logging.logback.rollingpolicy.total-size-cap=5GB


# ====================================================================
# 4. PADRAO DE FORMATO (Correlacionamento)
# ====================================================================

# Padrao de formato para o arquivo de log.
# Inclui: Data, Nivel, PID, Nome do Logger, MENSAGEM
# NOTA: O MDC (%X{traceId}) NAO PODE ser configurado aqui, pois exige o XML para customizar o Pattern.
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level ${PID:-} %logger{39} - %msg%n