<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Torneio - Exportação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .topo-manager {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
            border-bottom: 4px solid #18bc9c;
        }
    </style>
</head>
<body class="bg-light">

	<header class="topo-manager shadow-sm">
	        <div class="container text-center">
	            <h2 class="mb-0">TORNEIO EXPORT MANAGER - <span class="text-info">SUPER 8 / 12 / 16</span></h2>
	            <small>Distribuição todos contra todos e Confrontos Internos</small>
	        </div>
	        
	        <div class="container mt-3 nav-links text-center">
	            <a href="index.html" class="btn btn-outline-light btn-sm">
	                <i class="bi bi-person-fill"></i> Super 8/12/16
	            </a>
	            <a href="index-times.html" class="btn btn-outline-light btn-sm">
	                <i class="bi bi-shield-shaded"></i> Times (Melhor de 3)
	            </a>
	            <a href="index-times-set-unico.html" class="btn btn-outline-light btn-sm">
	                <i class="bi bi-1-circle"></i> Times (Set Único)
	            </a>
	            <a href="index-grupos.html" class="btn btn-info btn-sm active text-white">
	                <i class="bi bi-diagram-3"></i> Grupos
	            </a>
	        </div>
	    </header>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <label for="listaAtletas" class="form-label font-weight-bold">
                            Insira os nomes dos atletas (8 ou 12 ou 16 nomes recomendados):
                        </label>
                        
                        <textarea id="listaAtletas" class="form-control mb-3" rows="10" 
                            placeholder="Um nome por linha...">João Silva
Mariana Souza
Carlos Oliveira
Beatriz Santos
Ricardo Pereira
Ana Paula Costa
Fernando Almeida
Juliana Martins
						</textarea>

                        <div class="d-grid">
                            <button onclick="exportarExcel()" class="btn btn-success btn-lg">
                                Gerar e Exportar .XLSX
                            </button>
                        </div>
                    </div>
                    <div class="card-footer text-muted small">
                        * A planilha gerada incluirá a lógica de pontuação sendo a SOMA dos Saldos das partidas.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function exportarExcel() {
            const nomes = document.getElementById('listaAtletas').value;
            
            if (!nomes.trim()) {
                alert("Por favor, insira os nomes dos atletas.");
                return;
            }

            // Criação de formulário dinâmico para submissão via POST (Download de arquivo)
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/torneio/exportar-excel'; // Endpoint do seu Controller

            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'lista1'; // Nome do @RequestParam no Java
            input.value = nomes;

            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }
    </script>
</body>
</html>
